name: CI with Traffic Capture

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-and-capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      # === Các bước mô phỏng tấn công / lỗi ===
      - name: Normal traffic (no attack)
        run: curl -I https://www.google.com

      - name: Simulate malicious request (fake attack)
        run: |
          curl -I https://evil.com || true
          curl -X POST https://fake-api.com/data -d '{"malicious":true}'

      - name: Simulate high traffic (DDoS-like)
        run: |
          for i in {1..50}; do curl -s https://httpbin.org/get > /dev/null; done

      - name: Simulate vulnerability scan
        run: |
          curl -s http://testphp.vulnweb.com/artists.php?artist=1
          curl -s "http://testphp.vulnweb.com/Less-1/?id=1' OR '1'='1"

      - name: Run tests (may fail)
        run: |
          # Giả lập một test thất bại
          if [ "$(date +%S)" -gt "30" ]; then exit 1; else exit 0; fi